# Production stack: Postgres + Django (gunicorn) + nginx serving the Vue SPA.
# Isolated under the "adacc" project name; only the web service exposes a port.
name: adacc

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adacc}
      POSTGRES_USER: ${POSTGRES_USER:-adacc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adacc}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-adacc}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-adacc}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  db_data:
